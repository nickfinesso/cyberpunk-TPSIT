<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="stylePB.css" rel="stylesheet" />
</head>
<body class="bg-dark text-light">

  <main class="container py-5">
    <h3 class="mb-4">Accesso</h3>

    <form id="login-form" class="bg-secondary p-4 rounded" style="max-width:500px;">
      <div class="mb-3">
        <label for="inputEmail" class="form-label">Email address</label>
        <input type="email" class="form-control" id="inputEmail" placeholder="name@example.com" required />
      </div>

      <div class="mb-3">
        <label for="password-input" class="form-label">Password</label>
        <input type="password" class="form-control" id="password-input" aria-describedby="msg-password" required />
        <div id="msg-password" class="form-text text-warning"></div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="check1" />
        <label class="form-check-label" for="check1">Accetto i termini</label>
      </div>

      <button id="submit-btn" type="submit" class="btn btn-primary" disabled>Submit</button>
    </form>
  </main>

  <script>
    // Elementi
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('inputEmail');
    const passwordInput = document.getElementById('password-input');
    const msgPassword = document.getElementById('msg-password');
    const check1 = document.getElementById('check1');
    const submitBtn = document.getElementById('submit-btn');

    // Controllo password: almeno 8 caratteri
    function checkPasswordRules(pwd) {
      return pwd.length >= 8;
    }

    // Validazione live e abilitazione bottone
    function validateForm() {
      const pwd = passwordInput.value || '';
      let valid = true;
      msgPassword.textContent = '';

      if (!checkPasswordRules(pwd)) {
        msgPassword.textContent = 'La password deve contenere almeno 8 caratteri.';
        valid = false;
      }

      if (!check1.checked) valid = false;

      submitBtn.disabled = !valid;
    }

    passwordInput.addEventListener('input', validateForm);
    check1.addEventListener('change', validateForm);

    // Gestione submit: evita invio reale e reindirizza se valido
    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const email = emailInput.value.trim();
      const pwd = passwordInput.value;

      if (!email) {
        alert('Inserisci un indirizzo email valido.');
        return;
      }

      if (!checkPasswordRules(pwd)) {
        msgPassword.textContent = 'La password deve contenere almeno 8 caratteri.';
        return;
      }

      if (!check1.checked) {
        alert('Devi accettare i termini per procedere.');
        return;
      }

      // Qui puoi aggiungere chiamata fetch per autenticazione server-side
      // Per ora reindirizziamo alla pagina PrisonBreak.html
      window.location.href = 'cyberpunk.html';
    });

    // Inizializza stato
    validateForm();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.4.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
